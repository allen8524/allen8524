name: Update Stats SVG

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 자정(UTC) 자동 실행
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Generate SVG cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: allen8524
          BOJ_USERNAME: allen8524
        run: node scripts/generate-stats.js

      - name: Commit updated SVGs
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add assets/github-stats.svg assets/boj-stats.svg
          git diff --cached --quiet || git commit -m "chore: update stats cards [skip ci]"
          git push
